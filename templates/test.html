<!DOCTYPE html>
<html lang="en">
<head>
    <title>AI Research Paper Summarizer</title>

<style>

*{
    box-sizing:border-box;
}


body {

    margin:0;
    min-height:100vh;

    background:
        radial-gradient(circle at 15% 15%, rgb(6,154,180), transparent 30%),
        radial-gradient(circle at 85% 80%, rgba(6,182,212,.45), transparent 25%),
        #0f172a;

    font-family:'Segoe UI', sans-serif;
    color:white;

}



/* Heading */

.head {

    font-size:80px;
    text-align:center;
    margin-top:50px;
    margin-bottom:10px;
    font-weight:900;

    background:linear-gradient(
        90deg,
        white,
        rgb(100,220,255)
    );

    background-clip:text;
    color:transparent;

    transform: translateY(60px);

}



.state {

    text-align:center;
    font-size:25px;
    color:#dbeafe;

    margin-bottom:60px;

    transform: translateY(30px);

}



/* Back Button */

.button {

    position:absolute;
    top:35px;
    left:40px;

}


.button button {

    width:130px;
    height:55px;

    border-radius:30px;
    border:none;

    font-size:18px;
    font-weight:bold;

    cursor:pointer;

    color:white;

    background:
    linear-gradient(
        135deg,
        #2563eb,
        #06b6d4
    );


    transition:.3s;

}


.button button:hover {

    transform:scale(1.08);

    box-shadow:
    0 0 25px rgba(6,182,212,.8);

}




/* Card Container */


.boxes1,
.boxes2 {

    display:flex;

    justify-content:center;

    gap:40px;

    margin-bottom:40px;

}





/* Cards */


.box1,
.box2 {

    width:380px;
    height:320px;


    padding:30px;


    border-radius:30px;


    background:

    linear-gradient(
        135deg,
        rgba(255,255,255,.2),
        rgba(255,255,255,.05)
    );


    backdrop-filter:blur(20px);


    border:
    1px solid rgba(255,255,255,.25);


    box-shadow:

    0 20px 40px rgba(0,0,0,.35);



    transition:.35s;


    position:relative;

    overflow:hidden;


}




.box1:hover,
.box2:hover {


    transform:
    translateY(-15px);


    box-shadow:

    0 30px 60px rgba(0,0,0,.55);


}




/* Glow Effect */


.box1::before,
.box2::before {


    content:"";


    position:absolute;


    width:200px;
    height:200px;


    background:
    rgba(0,220,255,.25);


    border-radius:50%;


    filter:blur(50px);


    top:-80px;
    right:-80px;


}




h2 {

    text-align:center;

    font-size:28px;

    margin-top:0;

}



p {


    color:#f1f5f9;


    font-size:17px;


    line-height:1.6;


}

.navbar {
        display: flex;
        justify-content: space-between;
        align-items: center;

        padding: 20px 60px;

        background: rgba(255,255,255,0.08);
        backdrop-filter: blur(15px);

        border-bottom: 1px solid rgba(255,255,255,.2);

        transform: translate(1px, -980px);
    }

.nav-links {
    display: flex;
    gap: 120px;
}

.nav-links a {
    text-decoration: none;
    color: white;
    font-size: 40px;
    font-family: 'Segoe UI', sans-serif;
    transition: 0.25s;
    transform: translate(70px);
    word-spacing: 30%;
}

.nav-links a:hover {
    color: rgb(70, 220, 255);
}

</style>
</head>

<body>
    <div class="title">
        <h1>AI Research Paper Summarizer</h1>
    </div>

    <nav class="navbar">

        <div class="nav-links">
            <a href="/">blah</a>
            <a href="{{ url_for('features')}}">Features</a>
            <a href="{{ url_for('About')}}">About</a>
            <a href="{{ url_for('login')}}">Login</a>
            <a href="{{ url_for('Notes')}}">Notes</a>
        </div>
    </nav>

    <div class="upload-container">
        <label for="pdfInput" class="custom-file-upload">Submit Your PDF File Here:</label>
        <br>
        <br>
        <div class="upload-box">
            <p class="state">Upload PDF</p>
            <br>
            <p class="extra">Let AI extract, analyze, and answer qustions about your paper</p>
            <input type="file" id="pdfInput" accept="application/pdf">
        </div>

        <div class="query-container">
            <input type="text" id="userQuery" placeholder="  Enter your question here">
            <button class="button" onclick="Query()">Enter</button>
        </div>
    </div>

    <div class="signup-container">
        <P class="account">Account</P>
        <p class="info"> Sign up to save papers and conversations</p>
        <input type="text" id="email" placeholder="Enter your email: ">
        <br>
        <input type="password" id="password" placeholder="Enter your password: ">
        <button id="signUp" onclick="Authentication()">Sign Up</button>
    </div>

    <div style="
    background:red;
    color:white;
    font-size:60px;
    font-weight:bold;
    text-align:center;
    padding:30px;
    position:fixed;
    top:0;
    left:0;
    width:100%;
    z-index:999999;
">
🚨 IF YOU CAN SEE THIS, THIS HTML FILE IS UPDATING 🚨
</div>


    <img src="LOGOS.png">
<script type="module" src="{{ url_for('static', filename='script.js') }}"></script>
</body>

</html>
